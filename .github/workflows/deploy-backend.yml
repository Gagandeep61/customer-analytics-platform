name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

env:
  # Opts into Node.js 24 runner to fully eliminate the deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os

          # Initialize API with your GitHub repository secret token
          api = HfApi(token=os.environ['HF_TOKEN'])
          
          print('Starting sync to Hugging Face Space...')
          
          api.upload_folder(
              folder_path='backend',
              repo_id='gagan61/customer-analytics-api',
              repo_type='space',
              delete_disappeared_files=True
          )
          
          print('Sync completed successfully! Your Space is up to date.')
          "