name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Use v4 to clear that Node.js warning and grab the fresh workspace
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Step 2: Set up Git identity and LFS tracking in the virtual environment
      - name: Install and configure Git LFS
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git lfs install

      # Step 3: Use a clean subtree push to isolate just the backend folder to HF
      - name: Push backend directory to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a clean tracking pointer to your Hugging Face space
          git remote add huggingface https://gagan61:$HF_TOKEN@huggingface.co/spaces/gagan61/customer-analytics-api
          
          # Push ONLY the contents of the backend folder directly to HF's main branch
          git subtree push --prefix backend huggingface main --force