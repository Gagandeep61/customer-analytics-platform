name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Fixed: Added the missing hyphen below so YAML reads this as a valid step list item
      - name: Push backend directory to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Move into the backend directory
          cd backend
          
          # 2. Build a fresh temporary Git tracking space *inside* this folder on the runner
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # 3. Bring along any Git Attributes (like your Git LFS tracking rules for your .pkl files)
          if [ -f ../.gitattributes ]; then cp ../.gitattributes .; fi
          
          # 4. Stage and commit all backend code
          git add .
          git commit -m "Auto-deploy from GitHub Actions"
          
          # 5. Push directly and force overwrite Hugging Face with the true main code
          git push https://gagan61:$HF_TOKEN@huggingface.co/spaces/gagan61/customer-analytics-api main --force