name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Official, bulletproof action specifically designed to sync a subfolder to Hugging Face Spaces
      - name: Push to Hugging Face Spaces
        uses: itsmebhavin/github-action-huggingface-space-sync@v1
        with:
          # Your Hugging Face Username
          username: "gagan61"
          # The name of your Hugging Face Space repository
          space_name: "customer-analytics-api"
          # The secure secret key you saved in GitHub settings
          hf_token: ${{ secrets.HF_TOKEN }}
          # Tell the runner to ONLY push the backend directory
          subdirectory: "backend"